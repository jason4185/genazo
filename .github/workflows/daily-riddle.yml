name: Daily Riddle Generation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate daily riddle
        run: cd scripts && node daily-riddle.js
        env:
          FUNDED_PRIVATE_KEY: ${{ secrets.FUNDED_PRIVATE_KEY }}
